name: Frontend Web Workflow

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'Makefile'
      - '.github/workflows/frontend-web-workflow.yml'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'Makefile'
      - '.github/workflows/frontend-web-workflow.yml'

jobs:
  # Lint Job：無論是 Push 或 Tag 都會執行
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  # 型別檢查 Job：無論是 Push 或 Tag 都會執行
  type-check:
    needs: [lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm type-check

  # 打包與部署 Job：只有在符合 Tag 格式時才執行
  build-and-deploy:
    # 這裡確保 lint 與 type-check 通過才跑 build
    needs: [type-check]
    # 關鍵條件：判斷當前的 ref 是否為 tag
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: delta-cast-demo
      url: ${{ vars.APP_URL }}
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and deploy to Cloudflare Pages
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
