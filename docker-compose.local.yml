services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env.local
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcp-sa-key.json
    volumes:
      - ${HOME}/deltacast-sa-key.json:/run/secrets/gcp-sa-key.json:ro
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.local
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
