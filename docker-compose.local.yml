services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env.local
    environment:
      - GCP_SA_KEY_PATH=/run/secrets/gcp-sa-key.json
    volumes:
      - ${HOME}/deltacast-sa-key.json:/run/secrets/gcp-sa-key.json:ro
    restart: unless-stopped
  # 前端為獨立 React SPA，使用 `cd web && pnpm dev` 本機開發
  # 或透過 Cloudflare Pages 靜態部署 (`pnpm deploy`)
